name: ci

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      # 未提交 package-lock.json 时不要写 cache: npm（否则会报 “lock file not found”）
      # 本地执行 npm install 后提交 package-lock.json，再把下面两行改回 cache: npm + npm ci
      - name: Install dependencies
        run: npm install

      - name: Run tests
        run: npm test
