# 将 public/ 部署到 GitHub Pages（需在仓库 Settings → Pages 将 Source 设为 GitHub Actions）
name: pages

on:
  push:
    branches: [main, master]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - name: Cache-bust app.js (避免 Pages/CDN 长期缓存旧脚本)
        run: |
          short=$(echo "$GITHUB_SHA" | cut -c1-7)
          sed -i.bak "s|src=\"app.js\"|src=\"app.js?cb=${short}\"|" public/index.html
          rm -f public/index.html.bak
      - uses: actions/configure-pages@v4
      - uses: actions/upload-pages-artifact@v3
        with:
          path: public
      - id: deployment
        uses: actions/deploy-pages@v4
